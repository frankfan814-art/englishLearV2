name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x ./gradlew

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish Direct Download Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          commit: ${{ github.sha }}
          tag: "latest"
          name: "🌟 最新版 App"
          body: "👉 点击下方的 **`app-debug.apk`** 即可直接下载安装，无需解压，无需登录！\n\n*(这是由机器人自动打包的最新版本)*"
          artifacts: "android/app/build/outputs/apk/debug/app-debug.apk"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Pgyer
        id: pgyer
        continue-on-error: true
        if: env.PGYER_API_KEY != ''
        run: |
          response=$(curl -s -F "file=@android/app/build/outputs/apk/debug/app-debug.apk" \
            -F "_api_key=${PGYER_API_KEY}" \
            https://www.pgyer.com/apiv2/app/upload)
          echo "$response"
          short_url=$(echo "$response" | jq -r '.data.buildShortcutUrl')
          echo "url=https://www.pgyer.com/${short_url}" >> "$GITHUB_OUTPUT"

      - name: Output Download Links
        if: always()
        run: |
          {
            echo "### 📱 手机直接安装（无需电脑中转）"
            echo ""
            echo "- **蒲公英（国内推荐）**：${{ steps.pgyer.outputs.url }}"
            echo "- **GitHub Releases（固定地址，可收藏）**：https://github.com/${{ github.repository }}/releases/tag/latest"
          } >> "$GITHUB_STEP_SUMMARY"
